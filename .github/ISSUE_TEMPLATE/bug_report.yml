name: "🐞 Bug Report / 问题反馈"
description: Crashes, connection failures, query errors, display bugs, or other reproducible issues. / 程序崩溃、连接失败、查询异常、界面显示错误或其他可复现问题。
title: "[🐞 Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。涉及敏感信息请脱敏。请尽量提供数据库类型、版本和错误日志。

  - type: input
    id: database
    attributes:
      label: 数据库类型和版本
      description: 例如 PostgreSQL 16、MySQL 8.0、Redis 7.2。
      placeholder: "例如：PostgreSQL 16.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？希望发生什么？
      placeholder: "例如：连接 PostgreSQL 后一直 loading，没有错误提示，期望能正常展开 schema。复现步骤：1. 新建连接 2. 填写信息 3. 点击保存..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: |
        **⚠️ 调试日志对定位和修复问题至关重要，请务必提供！**
        请在 DBX 中操作：设置 → 外观 → 开启"启用调试日志" → 复现问题 → 点击"下载日志"，将日志文件粘贴到这里。
        也可以提供终端、DevTools 的错误信息。
      render: shell

  - type: input
    id: app-version
    attributes:
      label: DBX 版本
      placeholder: "例如：v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      multiple: true
      options:
        - macOS
        - Windows
        - Linux
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（是否紧急）
      description: 紧急 = 希望下个版本优先修。维护者可根据实际情况调整。
      options:
        - "🔴 P0 紧急 · 下个版本必须修"
        - "🟠 P1 重要 · 尽快处理"
        - "🟡 P2 普通 · 按排期处理"
        - "🟢 P3 低优 · 有空再修"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、SQL 样例、连接方式、特殊环境等。
